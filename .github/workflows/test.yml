# Lint, type-check, and unit tests. Runs on every push and pull request
# to main. No API keys required — the unit suite mocks all provider I/O.
# The paid live-integration suite is a separate workflow (integration.yml).
name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Install dependencies
        # --no-editable installs streamwright as a real package dir (not a
        # PEP-660 editable finder shim), so mypy can read its py.typed types
        # for `from streamwright import ...` resolution on Linux.
        run: uv sync --dev --no-editable

      - name: Lint
        run: uv run ruff check .

      - name: Type-check
        run: uv run mypy streamwright tests

      - name: Test
        run: uv run pytest
