# Publish to PyPI when a GitHub Release is published.
#
# Uses PyPI Trusted Publishing (OIDC) so no API token is stored in the repo.
# One-time setup on PyPI: add a Trusted Publisher for this project pointing at
#   owner: arjunkarth1k, repo: streamwright-python, workflow: release.yml,
#   environment: pypi
# (For the very first publish, create a "pending publisher" on PyPI since the
# project does not exist there yet.)
name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/streamwright
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
